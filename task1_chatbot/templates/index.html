<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssistBot | AI Chat Interface</title>
    <!-- Modern Typography from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Link to custom stylesheets -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Minimalist Header -->
        <header class="glass-panel main-header">
            <div class="bot-info">
                <div class="avatar-container">
                    <div class="status-indicator"></div>
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=AssistBot&backgroundColor=1a1a1a" alt="Bot Avatar" class="bot-avatar">
                </div>
                <div class="title-group">
                    <h1>AssistBot</h1>
                    <span class="subtitle">Rule-Based Assistant</span>
                </div>
            </div>
            <div class="system-status">
                <span class="badge">CODSOFT Intern</span>
            </div>
        </header>

        <!-- Chat History Window -->
        <main class="chat-window scrollable" id="chat-window">
            <div class="message-group bot-group">
                <div class="chat-bubble bot-bubble">
                    <p>Hello! I'm your semantic <strong>AssistBot</strong>! Built using Python with advanced Pattern Matching rules.</p>
                </div>
                <div class="chat-bubble bot-bubble">
                    <p>You can ask me about math, science, literature, or just have a casual conversation. What's on your mind? 🚀</p>
                </div>
            </div>
            <!-- Dynamic Messages injected here via JS -->

            <!-- Typing Indicator (Hidden by default) -->
            <div class="typing-indicator-container hidden" id="typing-indicator">
                <div class="typing-bubble">
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
            </div>
        </main>

        <!-- Input Area -->
        <footer class="input-area glass-panel">
            <form id="chat-form" class="chat-form">
                <input type="text" id="chat-input" placeholder="Message AssistBot..." autocomplete="off" required>
                <button type="submit" id="send-btn" class="send-btn" aria-label="Send message">
                    <!-- SVG send icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
