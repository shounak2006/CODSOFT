<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Captioning | CODSOFT Task 3</title>
    <!-- Use Inter font for a modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Vision Analyzer</h1>
            <p>Upload any picture and let the Transformer AI describe it.</p>
        </header>

        <main>
            <!-- File Drop Zone -->
            <div class="drop-zone" id="drop-zone">
                <div class="drop-zone-content">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="upload-icon">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                        <polyline points="21 15 16 10 5 21"></polyline>
                    </svg>
                    <span class="drop-zone-prompt">Drag & Drop Image or Click to Browse</span>
                    <input type="file" name="image" id="file-input" class="file-input" accept="image/*">
                </div>
            </div>

            <!-- Image Preview & Loading State -->
            <div class="preview-container hidden" id="preview-container">
                <img src="" alt="Image Preview" id="image-preview" class="image-preview">
                
                <div class="processing-overlay hidden" id="processing-overlay">
                    <div class="spinner"></div>
                    <p>AI is analyzing pixels...</p>
                </div>
            </div>

            <!-- Result Box -->
            <div class="result-box hidden" id="result-box">
                <h3>Caption Generated:</h3>
                <p id="caption-text" class="caption-text"></p>
                <button class="reset-btn" id="reset-btn">Analyze Another Image</button>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
