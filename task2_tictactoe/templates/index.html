<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tic-Tac-Toe | CODSOFT Task 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="game-wrapper">
        <header class="header text-center">
            <h1>UNBEATABLE AI</h1>
            <p>Task 2: Game Theory & Minimax</p>
        </header>

        <section class="scoreboard">
            <div class="player player-x active" id="score-x">
                <span class="label">You (X)</span>
            </div>
            <div class="status-center">
                <span id="game-status">Your turn</span>
            </div>
            <div class="player player-o" id="score-o">
                <span class="label">AI (O)</span>
            </div>
        </section>

        <main class="grid-layer">
            <div class="tictactoe-grid" id="grid">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
            <div class="winning-line hidden" id="winning-line"></div>
        </main>

        <div class="controls text-center">
            <button id="reset-btn" class="glass-btn">Restart Game</button>
        </div>
    </div>

    <!-- Celebration Overlay -->
    <div id="overlay" class="overlay hidden">
        <div class="overlay-content">
            <h2 id="end-message">Game Over</h2>
            <button id="play-again" class="glass-btn primary">Play Again</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
